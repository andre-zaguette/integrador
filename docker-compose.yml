services:
  api:
    build: ./app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://isyshell:isyshell@postgres:5432/isyshell
      ADMIN_TOKEN: ${ADMIN_TOKEN:-supersecret}
      SCRIPTS_DIR: /scripts
    volumes:
      - ./scripts:/scripts
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: isyshell
      POSTGRES_PASSWORD: isyshell
      POSTGRES_DB: isyshell
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U isyshell"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
